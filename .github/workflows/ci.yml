name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

jobs:
  lint-and-unit:
    name: lint + unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (1.95.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: triage-cli-rs -> triage-cli-rs/target

      - name: cargo fmt --check
        working-directory: triage-cli-rs
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: triage-cli-rs
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (unit)
        working-directory: triage-cli-rs
        run: cargo test --lib --no-fail-fast

  integration:
    name: integration tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (1.95.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: triage-cli-rs -> triage-cli-rs/target

      - name: Build release binary (for CLI smoke tests)
        working-directory: triage-cli-rs
        run: cargo build --release

      - name: cargo test --test integration
        working-directory: triage-cli-rs
        run: cargo test --test integration --no-fail-fast

      - name: CLI smoke tests
        working-directory: triage-cli-rs
        run: cargo test --test integration runbook_cli --no-fail-fast

  # Sandbox E2E tests — runs only on pushes to main (not PRs) and only when
  # the SANDBOX_INTEGRATION secret is configured. These tests exercise real
  # Zendesk API calls against a designated sandbox account.  They are
  # intentionally NOT triggered on every PR to avoid burning API quota.
  # To run on a PR branch, use the workflow_dispatch trigger manually.
  sandbox-e2e:
    name: sandbox E2E (ubuntu)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (1.95.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: triage-cli-rs -> triage-cli-rs/target

      - name: Load sandbox credentials
        run: |
          # Write .env from GitHub secrets.  The sandbox environment in
          # GitHub holds these secrets — they are NEVER printed or logged.
          cat > .env <<'EOF'
          ZENDESK_SUBDOMAIN=${{ secrets.ZENDESK_SUBDOMAIN }}
          ZENDESK_EMAIL=${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN=${{ secrets.ZENDESK_API_TOKEN }}
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          EOF
          # Append optional provider secrets if set
          if [ -n "${{ secrets.UNLEASH_API_KEY }}" ]; then
            echo "UNLEASH_API_KEY=${{ secrets.UNLEASH_API_KEY }}" >> .env
          fi
          if [ -n "${{ secrets.UNLEASH_ASSISTANT_ID }}" ]; then
            echo "UNLEASH_ASSISTANT_ID=${{ secrets.UNLEASH_ASSISTANT_ID }}" >> .env
          fi

      - name: Verify sandbox credentials
        working-directory: triage-cli-rs
        run: |
          set -a && source ../.env && set +a
          cargo build --release
          ./target/release/triage-cli doctor

      - name: Run sandbox tests
        working-directory: triage-cli-rs
        env:
          SANDBOX_INTEGRATION: "1"
        run: |
          set -a && source ../.env && set +a
          cargo test --test sandbox -- --nocapture

      - name: Cleanup .env
        if: always()
        run: rm -f .env
